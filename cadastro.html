<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro | Dom Fit</title>

    <link rel="stylesheet" href="style-login.css" />
  </head>
  <body>
    <div class="layout">
      <aside>
        <h1>
          Dom Fit <br />
          Academia
        </h1>
        <p>
          Faça seu cadastro e comece sua jornada com uma estrutura profissional,
          treinos de qualidade e acompanhamento completo.
        </p>
      </aside>

      <div class="div-form">
        <h2>Preencha os seus dados</h2>
        <form action="">
          
          <div class="div-campo">
            <label for="">Nome</label>
            <input type="text" placeholder="Insira seu nome completo"/>
          </div>
          
          <div class="div-campo">
            <label for="">E-mail</label>
            <input type="email" placeholder="Insira seu email"/>
          </div>
      
          <div class="div-campo">
            <label for="">Telefone:</label>
            <div class="div-tel">
              <!-- DDD -->
                <select name="" id="">
                  <option value="11">11</option>
                  <option value="21">21</option>
                  <option value="51">51</option>
                  <option value="92">92</option>
                  <option value="65">65</option>
                  <option value="79">79</option>
                  <option value="68">68</option>
                  <option value="96">96</option>
                </select>
                <!-- Telefone -->
              <input class="input-number" type="number" placeholder="99999-9999" />
            </div>
          </div>
          
          <div class="div-campo">
            <label for="">Senha:</label>
            <input type="text" placeholder="Crie uma senha" />
          </div>
         
          <input class="button" type="submit" value=" Finalize sua inscrção" />
          <input class="button" type="reset" value="Limpar formulario" />
        </form>
      </div>
    </div>
  </body>
</html>
