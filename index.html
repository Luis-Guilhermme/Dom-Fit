<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- icones -->
    <script src="https://kit.fontawesome.com/a905c455a5.js" crossorigin="anonymous"></script>

    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="img/academia.png">

    <title>Dom Fit | Academia</title>
</head>
<body>

    <aside>
        <header>
            <div class="div-logo">
                <img src="img/academia.png" alt="logo da academia">
                <h1>Dom Fit</h1>
            </div>

            <a href="">
                <button>
                    FAÇA SUA MATRÍCULA
                </button>
            </a>
        </header>

        <section class="section1">
            <h2>Dom Fit</h2>
            <h2>Academia</h2>
            <p>Bem-vindo à Dom Fit, sua academia de confiança!</p>
        </section>

        <section class="section2">
            <p>Oferecemos os melhores serviços de academia com equipamentos modernos e profissionais qualificados.</p>
            <div class="cards div1-section2">
                <i class="fa-solid fa-dumbbell"></i>
                <p>Equipamentos Modernos</p>
            </div>

            <div class="cards div2-section2">
                <i class="fa-solid fa-weight-hanging"></i>
                <p>Profissionais Qualificados</p>
            </div>

            <div class="cards div3-section2">
                <i class="fa-solid fa-weight-hanging"></i>
                <p>Resultados Comprovados</p>
            </div>
        </section>
    </aside>

    <div>
        <section>

        </section>

    </div>

</html>
