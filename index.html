<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- icones -->
    <script src="https://kit.fontawesome.com/a905c455a5.js" crossorigin="anonymous"></script>

    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="img/academia.png">

    <title>Dom Fit | Academia</title>

<body>

    <aside>
        <header>
            <div class="div-logo">
                <img src="img/academia.png" alt="logo da academia">

            </div>

            <a href="">
                <button>
                    FAÇA SUA MATRÍCULA
                </button>
            </a>

                <div class="cards div2-section2">

                <div class="cards div3-section2">

            <nav>
                <ul>
                    <li>
                        <a href="">Whatsapp</a>
                    </li>
                    <li>

                    </li>
                    <li>
                        <a href="">Serviços</a>
                    </li>
                    <li>

                    </li>
                </ul>

    <section>
        <div>
            <img src="./img/energiefitness-workout-6783020.jpg" alt="treino">
        </div>
        <div>
