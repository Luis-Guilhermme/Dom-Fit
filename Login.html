<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dom Fit</title>
    <link rel="stylesheet" href="style-login.css">
</head>

<body>
    <div class="layout">
        <aside>
            <h2>Bem-vindo à Academia <br> Dom Fit!</h2>
            <p>
                Acesse sua conta para acompanhar seus treinos, evolução e aproveitar todos os benefícios que preparamos
                para você.

        </aside>
        
        <div class="div-form">
            <h2 class="">Login</h2>
            <form action="">
                <label for="Email">Email</label>
                <input type="Email" placeholder="Digite seu email" required>

                <label for="Senha">Senha</label>
                <input type="password" placeholder="Digite sua senha" required>

                <div class="link">
                    <a href="senha.html">
                        Esqueci minha senha
                    </a>

                    <a href="cadastro.html">
                        Não tenho cadastro
                    </a>
                </div>

                <input type="submit" class="button" value="Crie sua conta">
            </form>

            <button class="btn-google">
                <img src="img/logo-google.png" alt="logo-google" class="logo-google">
                Entre com o Google
            </button>
        </div>
    </div>
</body>

</html>
