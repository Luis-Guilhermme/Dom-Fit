<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recupere sua senha</title>

    <link rel="stylesheet" href="style-login.css" />
  </head>
  <body>
    <div class="layout">
      <aside>
        <h1>
          Dom Fit <br />
          Recupere sua senha
        </h1>
        <p>
          Informe seu e-mail cadastrado. Enviaremos um link seguro para
          redefinir sua senha.
        </p>
      </aside>

      <div class="div-form">
        <form action="">
          <label for="">Email</label>
          <input type="email" required placeholder="Digite seu email" />

          <input
            class="button"
            type="submit"
            value="Envie o link de redefinição"
          />
        </form>
        <div>
          <a href="">
            <button class="button button2">Voltar ao login</button>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
